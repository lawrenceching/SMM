<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9EBFDVX2H8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-9EBFDVX2H8');
    </script>
    <title>Simple Media Manager (SMM)</title>
    <meta
      name="description"
      content="Simple Media Manager (SMM) — an AI-powered media library manager for Windows, macOS and Linux."
    />
    <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg" />
    <link rel="canonical" href="https://lawrenceching.github.io/SMM/" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("smm-site-lang");
          var lang = stored || (navigator.language || "en").toLowerCase();
          var target = lang.indexOf("zh") === 0 ? "./zh/" : "./en/";
          window.location.replace(target);
        } catch (e) {
          window.location.replace("./en/");
        }
      })();
    </script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f8fa;
        color: #0f172a;
      }
      .box {
        text-align: center;
        padding: 32px;
      }
      .box a {
        display: inline-block;
        margin: 4px 6px;
        padding: 10px 18px;
        background: #6366f1;
        color: #fff;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
      }
      .box a:hover {
        background: #4f46e5;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Simple Media Manager</h1>
      <p>Choose your language / 选择语言</p>
      <p>
        <a href="./en/">English</a>
        <a href="./zh/">中文</a>
      </p>
    </div>
  </body>
</html>
