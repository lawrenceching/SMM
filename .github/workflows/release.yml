name: Release Electron

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Git tag for the release (e.g. v1.2.3)'
        required: true
        type: string
      release_name:
        description: 'Release title (optional)'
        required: false
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean
      body:
        description: 'Release notes (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-electron-release:
    name: Build Electron (Release)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ 
          ubuntu-latest, 
          windows-latest, 
          macos-14
        ]
        arch: [x64, arm64]
        include:
          - os: ubuntu-latest
            platform: linux
            build-command: build:linux
          - os: windows-latest
            platform: win
            build-command: build:win
          - os: windows-11-arm
            platform: win
            build-command: build:win
            arch: arm64
          - os: macos-14
            platform: mac
            build-command: build:mac
            arch: arm64
          - os: ubuntu-24.04-arm
            platform: linux
            build-command: build:linux
            arch: arm64
        exclude:
          - os: macos-14
            arch: x64
          - os: windows-latest
            arch: arm64
          - os: ubuntu-latest
            arch: arm64

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install all dependencies
        run: pnpm install --frozen-lockfile

      - name: Install electron dependencies
        run: cd apps/electron && pnpm install --frozen-lockfile

      - name: Download third-party binaries
        run: bash ci/download-3pp-binary.sh
        env:
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          PLUGINS_VERSION: v1.0.0
          VIDEOCAPTIONER_VERSION: 1.0.0

      - name: Build cli
        run: pnpm --filter cli run build
        # Windows ARM64 (windows-11-arm) and Linux ARM64 (ubuntu-24.04-arm) use native ARM runners, no CLI_COMPILE_TARGET needed

      - name: Build ui
        run: cd apps/ui && pnpm run build

      - name: Build Electron (${{ matrix.platform }}-${{ matrix.arch }})
        run: cd apps/electron && pnpm run ${{ matrix.build-command }} -- --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and commit info
        id: version-info
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
        working-directory: ./apps/electron

      - name: Upload Electron distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smm-v${{ steps.version-info.outputs.version }}-${{ steps.version-info.outputs.short_sha }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            apps/electron/dist/*.exe
            apps/electron/dist/*.dmg
            apps/electron/dist/*.AppImage
            apps/electron/dist/*.deb
            apps/electron/dist/*.snap
          retention-days: 30

  release-electron:
    name: Create GitHub Release (Electron installers)
    needs: [build-electron-release]
    runs-on: ubuntu-latest

    steps:
      - name: Download Electron artifacts (all platforms)
        uses: actions/download-artifact@v4
        with:
          pattern: smm-v*
          merge-multiple: true
          path: dist

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ (github.event.inputs.release_name != '' && github.event.inputs.release_name) || github.event.inputs.tag_name }}
          draft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          body: ${{ github.event.inputs.body }}
          files: |
            dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

