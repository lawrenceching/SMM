name: Release Electron

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Git tag for the release (e.g. v1.2.3)'
        required: true
        type: string
      release_name:
        description: 'Release title (optional)'
        required: false
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean
      body:
        description: 'Release notes (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-electron-linux-x64:
    name: Build Electron (linux-x64)
    runs-on: ubuntu-latest
    env:
      PLATFORM: linux
      ARCH: x64
      BUILD_COMMAND: build:linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install all dependencies
        run: pnpm install --frozen-lockfile

      - name: Install electron dependencies
        run: cd apps/electron && pnpm install --frozen-lockfile

      - name: Download third-party binaries
        run: bash ci/download-3pp-binary.sh
        env:
          PLATFORM: ${{ env.PLATFORM }}
          ARCH: ${{ env.ARCH }}
          PLUGINS_VERSION: v1.0.0
          VIDEOCAPTIONER_VERSION: 1.0.0

      - name: Build cli
        run: pnpm --filter cli run build

      - name: Build ui
        run: cd apps/ui && pnpm run build

      - name: Build Electron (${{ env.PLATFORM }}-${{ env.ARCH }})
        run: cd apps/electron && pnpm run ${{ env.BUILD_COMMAND }} -- --${{ env.ARCH }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and commit info
        id: version-info
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
        working-directory: ./apps/electron

      - name: Upload Electron distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smm-v${{ steps.version-info.outputs.version }}-${{ steps.version-info.outputs.short_sha }}-${{ env.PLATFORM }}-${{ env.ARCH }}
          path: |
            apps/electron/dist/*.exe
            apps/electron/dist/*.dmg
            apps/electron/dist/*.AppImage
            apps/electron/dist/*.deb
          retention-days: 30

