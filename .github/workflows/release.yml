            apps/electron/dist/*.exe
            apps/electron/dist/*.dmg
            apps/electron/dist/*.AppImage
            apps/electron/dist/*.deb
          retention-days: 30

  release-electron:
    name: Create GitHub Release (Electron installers)
    needs:
      - build-electron-linux-x64
      - build-electron-linux-arm64
      - build-electron-windows-x64
      - build-electron-windows-arm64
      - build-electron-mac-arm64
    runs-on: ubuntu-latest

    steps:
      - name: Download Electron artifacts (all platforms)
        uses: actions/download-artifact@v4
        with:
          pattern: smm-v*
          merge-multiple: true
          path: dist

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ (github.event.inputs.release_name != '' && github.event.inputs.release_name) || github.event.inputs.tag_name }}
          draft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          body: ${{ github.event.inputs.body }}
          files: |
            dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
