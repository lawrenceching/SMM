name: E2E Test

on:
  workflow_dispatch:

jobs:
  e2e:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Run AI Tests
            spec: "./test/specs/ai/*.e2e.ts"
            artifact_prefix: ai
          - name: Run Config Tests
            spec: "./test/specs/config/*.e2e.ts"
            artifact_prefix: config
          - name: Run MCP Tests
            spec: "./test/specs/mcp/*.e2e.ts"
            artifact_prefix: mcp
          - name: Run Media Folder Initialization Tests
            spec: "./test/specs/media-folder-initialization/*.e2e.ts"
            artifact_prefix: media-folder-initialization
          - name: Run Movie Tests
            spec: "./test/specs/movie/*.e2e.ts"
            artifact_prefix: movie
          - name: Run Music Tests
            spec: "./test/specs/music/*.e2e.ts"
            artifact_prefix: music
          - name: Run Other Tests
            spec: "./test/specs/other/*.e2e.ts"
            artifact_prefix: other
          - name: Run Transcribe Tests
            spec: "./test/specs/transcribe/*.e2e.ts"
            artifact_prefix: transcribe
          - name: Run TV Show Tests
            spec: "./test/specs/tv/*.e2e.ts"
            artifact_prefix: tv
          - name: Run TVDB Tests
            spec: "./test/specs/tvdb/*.e2e.ts"
            artifact_prefix: tvdb

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install all dependencies
        run: pnpm install --frozen-lockfile

      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: '146.0.7680.153'
          install-dependencies: true
          install-chromedriver: true

      - name: Run E2E tests
        id: e2e
        run: bun ci/run-e2e-test.ts --spec "${{ matrix.spec }}"
        env:
          BUILD_ENV: docker
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER: ${{ steps.setup-chrome.outputs.chromedriver-path }}

      - name: Upload E2E logs and reports
        if: always() && steps.e2e.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-logs-${{ github.run_id }}
          path: artifacts/cicd/
          if-no-files-found: ignore
          retention-days: 7
