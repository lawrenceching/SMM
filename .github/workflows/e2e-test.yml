name: E2E Test

on:
  workflow_dispatch:

jobs:
  test:
    name: Run TV E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install all dependencies
        run: pnpm install --frozen-lockfile

      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Run TV E2E tests
        id: e2e
        run: bun ci/run-e2e-test.ts --spec "./test/specs/tv/*.e2e.ts"
        env:
          BUILD_ENV: docker

      - name: Upload E2E logs
        if: always() && steps.e2e.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ github.run_id }}
          path: artifacts/e2e/
          if-no-files-found: ignore
          retention-days: 7
