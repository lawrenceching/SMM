name: Build UI, CLI and Electron

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/ui/**'
      - 'apps/cli/**'
      - 'apps/electron/**'
      - 'packages/core/**'
      - 'packages/utils/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/ui/**'
      - 'apps/cli/**'
      - 'apps/electron/**'
      - 'packages/core/**'
      - 'packages/utils/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/build.yml'

permissions:
  contents: write

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install all dependencies
        run: pnpm install --frozen-lockfile

      - name: Run all tests
        run: pnpm -r test

  build-ui:
    name: Build UI
    needs: [test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install all dependencies
        run: pnpm install --frozen-lockfile

      - name: Build UI
        run: cd apps/ui && pnpm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: apps/ui/dist
          retention-days: 7

  build-cli:
    name: Build CLI
    needs: [test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install all dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: cd apps/cli && pnpm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: apps/cli/dist
          retention-days: 7

  build-docker:
    name: Build Docker Image
    needs: [build-ui, build-cli]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: smm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
